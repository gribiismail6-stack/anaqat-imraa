<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استمارة الطلب</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* رسالة النجاح */
#successMessage{
    display:none;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:green;
}

.icon{
    font-size:40px;
}
</style>

</head>

<body>

<div class="container">

<h2>تأكيد الطلب</h2>

<form id="myForm">

<input type="text" id="name" placeholder="الاسم الكامل" required>
<input type="tel" id="phone" placeholder="رقم الهاتف" required>

<select id="wilaya" required>
<option value="">اختر الولاية</option>
<option>أدرار</option>
<option>الشلف</option>
<option>الأغواط</option>
<option>أم البواقي</option>
<option>باتنة</option>
<option>بجاية</option>
<option>بسكرة</option>
<option>بشار</option>
<option>البليدة</option>
<option>البويرة</option>
<option>تمنراست</option>
<option>تبسة</option>
<option>تلمسان</option>
<option>تيارت</option>
<option>تيزي وزو</option>
<option>الجزائر</option>
<option>الجلفة</option>
<option>جيجل</option>
<option>سطيف</option>
<option>سعيدة</option>
<option>سكيكدة</option>
<option>سيدي بلعباس</option>
<option>عنابة</option>
<option>قالمة</option>
<option>قسنطينة</option>
<option>المدية</option>
<option>مستغانم</option>
<option>المسيلة</option>
<option>معسكر</option>
<option>ورقلة</option>
<option>وهران</option>
<option>البيض</option>
<option>إليزي</option>
<option>برج بوعريريج</option>
<option>بومرداس</option>
<option>الطارف</option>
<option>تندوف</option>
<option>تيسمسيلت</option>
<option>الوادي</option>
<option>خنشلة</option>
<option>سوق أهراس</option>
<option>تيبازة</option>
<option>ميلة</option>
<option>عين الدفلى</option>
<option>النعامة</option>
<option>عين تموشنت</option>
<option>غرداية</option>
<option>غليزان</option>
<option>المغير</option>
<option>المنيعة</option>
<option>أولاد جلال</option>
<option>بني عباس</option>
<option>إن صالح</option>
<option>إن قزام</option>
<option>توقرت</option>
<option>جانت</option>
<option>المغير</option>
<option>بني عباس</option>
<option>المنيعة</option>
</select>

<input type="text" id="address" placeholder="العنوان الكامل" required>
<input type="number" id="quantity" placeholder="الكمية" required>

<button type="submit">إرسال الطلب</button>

</form>

<!-- رسالة النجاح -->
<div id="successMessage">
<div class="icon">✔</div>
تم إرسال الطلب بنجاح
</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwmoRbN_yGSQf69LNs3D3jxsT3leMSq19yq2glW79-mou41vAYXi8YVgvxQNDed2ISbZA/exec";

document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            wilaya: document.getElementById("wilaya").value,
            address: document.getElementById("address").value,
            quantity: document.getElementById("quantity").value
        })
    })
    .then(() => {
        this.style.display = "none";
        let msg = document.getElementById("successMessage");
        msg.style.display = "block";

        setTimeout(() => {
            msg.style.display = "none";
            this.style.display = "block";
            this.reset();
        }, 3000);
    })
    .catch(() => {
        alert("حدث خطأ أثناء إرسال الطلب.");
    });
});
</script>

</body>

</html>
