<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أناقة إمرأة</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section id="order">

  <h2>أناقة إمرأة</h2>

  <p class="price">السعر: 3500 دج</p>

  <form id="orderForm">

    <input type="text" id="name" placeholder="الاسم الكامل" required>

    <input type="tel" id="phone" placeholder="رقم الهاتف" required>

    <select id="wilaya" required>
      <option value="">اختر الولاية</option>
      <option>الجزائر</option>
      <option>وهران</option>
      <option>قسنطينة</option>
      <option>سطيف</option>
      <option>البليدة</option>
      <option>عنابة</option>
    </select>

    <button type="submit">إرسال الطلب</button>

 </form>

<div id="successMessage" class="success-box">
  <div class="checkmark">✔</div>
  <h3>تم بنجاح</h3>
  <p>تم إرسال طلبك بنجاح، شكراً لتسوقك من أناقة إمرأة ❤️</p>
</div>

</section>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let msg = document.getElementById("successMessage");

  // إظهار رسالة النجاح فقط بعد الضغط على إرسال
  msg.style.display = "block";

  // تفريغ الحقول
  this.reset();

  // إخفاء الرسالة بعد 4 ثواني
  setTimeout(() => {
    msg.style.display = "none";
  }, 4000);
});
</script>

</body>
</html>
