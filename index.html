<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تأكيد الطلب</title>

<style>

/* ⭐ خلفية فخمة */
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c, #3a3a3c);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ⭐ الصندوق */
.container{
  width:90%;
  max-width:600px;
}

/* ⭐ الفورم */
form{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* ⭐ صف الحقول */
.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

/* ⭐ نفس الحجم */
input, select{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

/* ⭐ زر */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* ⭐ رسالة النجاح */
#successBox{
  display:none;
  text-align:center;
  margin-bottom:10px;
  padding:25px;
  border-radius:15px;
  background:#ffffff;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* ⭐ دائرة نايك */
.circle{
  width:80px;
  height:80px;
  background:white;
  border-radius:50%;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* ⭐ علامة الصح */
.check{
  font-size:40px;
  color:green;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- ⭐ رسالة النجاح -->
<div id="successBox">
  <div class="circle">
    <div class="check">✔</div>
  </div>
  <h2 style="color:green;margin-top:10px;">تمت العملية بنجاح</h2>
  <p>شكراً لثقتك بنا ❤️</p>
</div>

<form id="orderForm">

<div class="row">
  <input type="text" name="firstName" placeholder="الاسم" required>
  <input type="text" name="lastName" placeholder="اللقب" required>
</div>

<div class="row">
  <input type="tel" name="phone" placeholder="رقم الهاتف" required>
  <select id="wilaya" required>
  <option value="">اختر الولاية</option>
  <option>أدرار</option>
  <option>الشلف</option>
  <option>الأغواط</option>
  <option>أم البواقي</option>
  <option>باتنة</option>
  <option>بجاية</option>
  <option>بسكرة</option>
  <option>بشار</option>
  <option>البليدة</option>
  <option>البويرة</option>
  <option>تمنراست</option>
  <option>تبسة</option>
  <option>تلمسان</option>
  <option>تيارت</option>
  <option>تيزي وزو</option>
  <option>الجزائر</option>
  <option>الجلفة</option>
  <option>جيجل</option>
  <option>سطيف</option>
  <option>سعيدة</option>
  <option>سكيكدة</option>
  <option>سيدي بلعباس</option>
  <option>عنابة</option>
  <option>قالمة</option>
  <option>قسنطينة</option>
  <option>المدية</option>
  <option>مستغانم</option>
  <option>المسيلة</option>
  <option>معسكر</option>
  <option>ورقلة</option>
  <option>وهران</option>
  <option>البيض</option>
  <option>إليزي</option>
  <option>برج بوعريريج</option>
  <option>بومرداس</option>
  <option>الطارف</option>
  <option>تندوف</option>
  <option>تيسمسيلت</option>
  <option>الوادي</option>
  <option>خنشلة</option>
  <option>سوق أهراس</option>
  <option>تيبازة</option>
  <option>ميلة</option>
  <option>عين الدفلى</option>
  <option>النعامة</option>
  <option>عين تموشنت</option>
  <option>غرداية</option>
  <option>غليزان</option>
</select>
</div>

<div class="row">
  <input type="text" name="address" placeholder="العنوان الكامل" required>
  <input type="number" name="quantity" placeholder="الكمية" required>
</div>

<button type="submit">تأكيد الطلب</button>

</form>

</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("successBox").style.display = "block";
  document.getElementById("orderForm").style.display = "none";
});
</script>
<script>
setTimeout(() => {
  let msg = document.getElementById("successMessage");
  if (msg) {
    msg.style.display = "none";
  }
}, 3000);
</script>
</body>
</html>
