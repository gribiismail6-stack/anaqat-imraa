<body>

<section id="order">

  <h2>أناقة إمرأة</h2>

  <p class="price">السعر: 3500 دج</p>

  <form id="orderForm">

    <input type="text" id="name" placeholder="الاسم الكامل" required>

    <input type="tel" id="phone" placeholder="رقم الهاتف" required>

<input type="text" id="address" placeholder="العنوان الكامل (الحي، الشارع...)" required>
    <select id="wilaya" required>
  <option value="">اختر الولاية</option>
  <option>أدرار</option>

  <option>أم البواقي</option>
  <option>باتنة</option>
  <option>بجاية</option>
  <option>بسكرة</option>
  <option>بشار</option>
  <option>البليدة</option>
  <option>البويرة</option>
  <option>تمنراست</option>
  <option>تبسة</option>
  <option>تلمسان</option>
  <option>تيارت</option>
  <option>تيزي وزو</option>
  <option>الجزائر</option>
  <option>الجلفة</option>
  <option>جيجل</option>
  <option>سطيف</option>
  <option>سعيدة</option>
  <option>سكيكدة</option>
  <option>سيدي بلعباس</option>
  <option>عنابة</option>
  <option>قالمة</option>
  <option>قسنطينة</option>
  <option>المدية</option>
  <option>مستغانم</option>
  <option>المسيلة</option>
  <option>معسكر</option>
  <option>ورقلة</option>
  <option>وهران</option>
  <option>البيض</option>
  <option>إليزي</option>
  <option>برج بوعريريج</option>
  <option>بومرداس</option>
  <option>الطارف</option>
  <option>تندوف</option>
  <option>تيسمسيلت</option>
  <option>الوادي</option>
  <option>خنشلة</option>
  <option>سوق أهراس</option>
  <option>تيبازة</option>
  <option>ميلة</option>
  <option>عين الدفلى</option>
  <option>النعامة</option>
  <option>عين تموشنت</option>
  <option>غرداية</option>
  <option>غليزان</option>
</select>
   

    <button type="submit">إرسال الطلب</button>

 </form>

<div id="successMessage" class="success-box">
  <div class="checkmark">✔</div>
  <h3>تم بنجاح</h3>
  <p>تم إرسال طلبك بنجاح، شكراً لتسوقك من أناقة إمرأة ❤️</p>
</div>

</section>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let msg = document.getElementById("successMessage");

  // إظهار رسالة النجاح فقط بعد الضغط على إرسال
  msg.style.display = "block";

  // تفريغ الحقول
  this.reset();

  // إخفاء الرسالة بعد 4 ثواني
  setTimeout(() => {
    msg.style.display = "none";
  }, 4000);
});
</script>

</body>
</html>
